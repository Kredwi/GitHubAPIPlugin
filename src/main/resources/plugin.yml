name: ${project.name}
description: ${project.description}
author: ${plugin.author}
version: ${project.version}
website: https://github.com/Kredwi/GitHubAPIPlugin
license: Apache License 2.0
main: ${plugin.main-class}
api-version: 1.13
folia-supported: false
depend: [ PlaceholderAPI ]
commands:
  githubapi:
    description: Main plugin command
    usage: /<command> [link | show]
    permission: githubapi.command
    default: op
permissions:
  githubapi.command:
    description: Access to plugin command
    default: true
  githubapi.command.show:
    description: Access to show command
    default: true
    children:
      githubapi.command: true
  githubapi.command.link:
    description: Access to link command
    default: op
    children:
      githubapi.command: true